<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>PanoView</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap');

:root{
  --bg:#000;--s1:#0a0a0a;--s2:#111;--border:#1c1c1c;
  --accent:#00cfff;--purple:#a259ff;--green:#00e676;--red:#ff3d5a;--warn:#ffab00;
  --text:#f0f0f0;--muted:#555;--muted2:#333;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:0 0 60px;overflow-x:hidden;}

/* ── Preview Modal ── */
#previewModal{
  display:none;position:fixed;inset:0;z-index:1000;background:#000;
  flex-direction:column;
}
#previewModal.open{display:flex;}
#pannellumContainer{flex:1;width:100%;}
.preview-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);position:absolute;top:0;left:0;right:0;z-index:10;
}
.preview-bar h2{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.1em;color:var(--accent);}
.preview-btns{display:flex;gap:8px;}
.preview-close{
  background:var(--s2);border:1px solid var(--border);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:.85rem;padding:8px 16px;border-radius:8px;
  cursor:pointer;transition:.15s;
}
.preview-close:hover{border-color:var(--red);color:var(--red);}
.preview-dl{
  background:var(--accent);border:none;color:#000;
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:.85rem;
  padding:8px 16px;border-radius:8px;cursor:pointer;transition:.15s;
}
.preview-dl:hover{opacity:.85;}
#previewLoading{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;background:#000;z-index:5;
}
#previewLoading.hidden{display:none;}
.spin{
  width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-label{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:.1em;}

/* ── Header ── */
header{
  width:100%;max-width:520px;padding:28px 20px 0;
  display:flex;align-items:center;gap:14px;
}
.logo-img{
  width:56px;height:56px;border-radius:14px;flex-shrink:0;
  box-shadow:0 0 24px rgba(0,207,255,.3);
  border:1px solid rgba(0,207,255,.25);
}
.logo-text h1{
  font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.08em;
  line-height:1;color:var(--text);
}
.logo-text h1 em{color:var(--accent);font-style:normal;}
.logo-text p{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);
  letter-spacing:.18em;text-transform:uppercase;margin-top:2px;}

/* ── Tabs ── */
.tabs{
  width:100%;max-width:520px;display:flex;gap:0;margin:20px 20px 0;
  width:calc(100% - 40px);max-width:480px;
  border:1px solid var(--border);border-radius:10px;overflow:hidden;
}
.tab{
  flex:1;background:transparent;border:none;color:var(--muted);
  font-family:'DM Sans',sans-serif;font-weight:500;font-size:.85rem;
  padding:12px;cursor:pointer;transition:.2s;letter-spacing:.03em;
}
.tab.active{background:var(--s2);color:var(--text);}
.tab:first-child{border-right:1px solid var(--border);}

/* ── Cards ── */
.card{
  width:calc(100% - 40px);max-width:480px;background:var(--s1);
  border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:12px;
}

/* ── Labels & Inputs ── */
.label{
  font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.15em;
  text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px;
}
.input-wrap{position:relative;margin-bottom:14px;}
textarea{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;
  color:var(--text);font-family:'DM Mono',monospace;font-size:.72rem;
  padding:13px 42px 13px 13px;outline:none;resize:none;
  transition:border-color .2s,box-shadow .2s;line-height:1.55;
}
textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,207,255,.08);}
#urlInput{height:76px;}
#step2Input{height:60px;}
#bulkInput{height:140px;}
.clear-btn{
  position:absolute;right:12px;top:13px;background:none;border:none;
  color:var(--muted);cursor:pointer;font-size:.9rem;padding:4px;transition:color .2s;
}
.clear-btn:hover{color:var(--text);}

/* ── Badges ── */
.badge{
  display:none;align-items:flex-start;gap:8px;border-radius:8px;
  padding:10px 12px;margin-bottom:12px;
  font-family:'DM Mono',monospace;font-size:.62rem;line-height:1.55;
}
.badge.show{display:flex;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.btext{word-break:break-all;flex:1;}
.bsub{font-size:.58rem;color:rgba(255,255,255,.35);display:block;margin-top:2px;}
.badge-sv{background:rgba(0,207,255,.06);border:1px solid rgba(0,207,255,.2);color:var(--accent);}
.badge-sv .dot{background:var(--accent);}
.badge-user{background:rgba(162,89,255,.06);border:1px solid rgba(162,89,255,.25);color:var(--purple);}
.badge-user .dot{background:var(--purple);}
.badge-warn{background:rgba(255,171,0,.06);border:1px solid rgba(255,171,0,.2);color:var(--warn);}
.badge-warn .dot{background:var(--warn);}

/* ── Maps step-2 box ── */
.maps-box{
  display:none;background:rgba(0,207,255,.03);border:1px solid rgba(0,207,255,.12);
  border-radius:10px;padding:14px;margin-bottom:14px;
}
.maps-box.show{display:block;}
.maps-box-title{
  font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;
}
.maps-btns{display:flex;gap:8px;margin-bottom:10px;}
.maps-open{
  flex:1;background:var(--accent);color:#000;border:none;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:.8rem;
  padding:10px;cursor:pointer;transition:.2s;
}
.maps-open:hover{opacity:.85;}
.maps-copylink{
  flex:1;display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(0,207,255,.3);border-radius:8px;color:var(--accent);
  font-family:'DM Mono',monospace;font-size:.65rem;padding:10px;
  text-decoration:none;transition:.2s;text-align:center;
}
.maps-copylink:hover{background:rgba(0,207,255,.07);}
.maps-inst{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);line-height:1.6;}
.maps-inst strong{color:var(--warn);}
.step2-wrap{margin-top:10px;}
.step2-label{
  font-family:'DM Mono',monospace;font-size:.58rem;color:var(--warn);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;display:block;
}

/* ── Action row ── */
.action-row{display:flex;gap:8px;margin-bottom:14px;}
.preview-btn{
  flex:1;background:var(--s2);border:1px solid var(--border);color:var(--text);
  font-family:'DM Sans',sans-serif;font-weight:500;font-size:.85rem;
  padding:12px;border-radius:9px;cursor:pointer;transition:.2s;
  display:none;align-items:center;justify-content:center;gap:6px;
}
.preview-btn.show{display:flex;}
.preview-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── Zoom pills ── */
.zoom-wrap{margin-bottom:16px;transition:opacity .2s;}
.zoom-wrap.dim{opacity:.3;pointer-events:none;}
.zoom-pills{display:flex;gap:6px;flex-wrap:wrap;}
.zpill{
  flex:1;min-width:52px;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;
  font-size:.68rem;padding:9px 4px;text-align:center;cursor:pointer;transition:.15s;
}
.zpill:hover{border-color:var(--accent);color:var(--accent);}
.zpill.active{background:rgba(0,207,255,.08);border-color:var(--accent);color:var(--accent);}
.zpill .res{display:block;font-size:.52rem;color:var(--muted);margin-top:2px;}
.zpill.active .res{color:rgba(0,207,255,.5);}

/* ── Download button ── */
.dl-btn{
  width:100%;background:var(--accent);color:#000;border:none;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;
  padding:15px;cursor:pointer;transition:.2s;letter-spacing:.02em;
  position:relative;overflow:hidden;
}
.dl-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);}
.dl-btn.user{background:var(--purple);}
.dl-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,207,255,.25);}
.dl-btn.user:hover{box-shadow:0 8px 24px rgba(162,89,255,.25);}
.dl-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}
.cancel-btn{
  width:100%;margin-top:8px;background:none;border:1px solid var(--border);
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.85rem;
  padding:11px;border-radius:10px;cursor:pointer;transition:.2s;display:none;
}
.cancel-btn.show{display:block;}
.cancel-btn:hover{border-color:var(--red);color:var(--red);}

/* ── Progress ── */
.progress-section{display:none;margin-top:16px;}
.progress-section.show{display:block;}
.prog-header{display:flex;justify-content:space-between;margin-bottom:6px;}
.prog-label{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
.prog-pct{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--accent);font-weight:500;}
.prog-bar{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:10px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),rgba(0,207,255,.5));
  border-radius:3px;transition:width .3s;width:0%;}
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(20px,1fr));
  gap:2px;max-height:80px;overflow:hidden;border-radius:5px;}
.tile-cell{height:20px;border-radius:2px;background:var(--border);transition:background .2s;}
.tile-cell.done{background:rgba(0,207,255,.4);}
.tile-cell.fail{background:rgba(255,61,90,.4);}
.tile-cell.loading{animation:pulse .6s ease-in-out infinite alternate;}
@keyframes pulse{from{background:rgba(0,207,255,.1)}to{background:rgba(0,207,255,.3)}}

/* ── Status ── */
.status-bar{
  display:none;margin-top:14px;padding:11px 13px;border-radius:8px;
  font-family:'DM Mono',monospace;font-size:.66rem;line-height:1.65;white-space:pre-wrap;
}
.status-bar.show{display:block;}
.status-bar.info{background:rgba(0,207,255,.06);border:1px solid rgba(0,207,255,.18);color:var(--accent);}
.status-bar.error{background:rgba(255,61,90,.06);border:1px solid rgba(255,61,90,.18);color:var(--red);}
.status-bar.success{background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.18);color:var(--green);}
.status-bar.warn{background:rgba(255,171,0,.06);border:1px solid rgba(255,171,0,.18);color:var(--warn);}

/* ── Tab content ── */
.tab-content{display:flex;flex-direction:column;align-items:center;width:100%;}
.tab-content.hidden{display:none;}

/* ── Bulk Queue ── */
.bulk-actions{display:flex;gap:8px;margin:10px 0;}
.bulk-parse{
  flex:1;background:var(--s2);border:1px solid var(--border);color:var(--text);
  font-family:'DM Sans',sans-serif;font-weight:500;font-size:.85rem;
  padding:11px;border-radius:9px;cursor:pointer;transition:.2s;
}
.bulk-parse:hover{border-color:var(--accent);}
.bulk-dl-all{
  flex:1;background:var(--accent);border:none;color:#000;
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:.85rem;
  padding:11px;border-radius:9px;cursor:pointer;transition:.2s;display:none;
}
.bulk-dl-all.show{display:block;}
.bulk-dl-all:hover{opacity:.85;}
#bulkQueue{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto;}
.queue-item{
  background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;display:flex;flex-direction:column;gap:4px;
}
.qi-url{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qi-info{font-family:'DM Mono',monospace;font-size:.62rem;}
.qi-status{font-family:'DM Mono',monospace;font-size:.6rem;
  padding:3px 8px;border-radius:4px;display:inline-block;width:fit-content;}
.qi-status.waiting{background:var(--border);color:var(--muted);}
.qi-status.fetching{background:rgba(0,207,255,.1);color:var(--accent);}
.qi-status.done{background:rgba(0,230,118,.1);color:var(--green);}
.qi-status.error{background:rgba(255,61,90,.1);color:var(--red);}
.qi-status.skipped{background:rgba(255,171,0,.1);color:var(--warn);}
</style>
</head>

<!-- ─── Single Tab ─── -->
<div id="singleTab" class="tab-content">
  <div class="card">
    <label class="label">Paste Google Maps / Earth / Street View URL</label>
    <div class="input-wrap">
      <textarea id="urlInput" placeholder="https://maps.google.com/… or earth.app.goo.gl/…" autocomplete="off" autocorrect="off" spellcheck="false" oninput="onUrlChange()"></textarea>
      <button class="clear-btn" onclick="clearAll()" title="Clear">✕</button>
    </div>

    <div class="badge badge-sv" id="badgeSV">
      <div class="dot"></div>
      <div class="btext"><span id="svPanoId"></span><span class="bsub" id="svSource"></span></div>
    </div>
    <div class="badge badge-user" id="badgeUser">
      <div class="dot"></div>
      <div class="btext"><span id="userPanoId"></span><span class="bsub" id="userSource"></span></div>
    </div>
    <div class="badge badge-warn" id="badgeCoords">
      <div class="dot"></div>
      <div class="btext" id="coordsText">Only coordinates found.</div>
    </div>

    <!-- Maps step-2 box -->
    <div class="maps-box" id="mapsBox">
      <div class="maps-box-title">🔗 Open in Google Maps to get download URL</div>
      <div class="maps-btns">
        <button class="maps-open" onclick="openInMaps()">↗ Open in Maps</button>
        <a class="maps-copylink" id="mapsLink" href="#" target="_blank">Copy / Open Link</a>
      </div>
      <div class="maps-inst">
        <strong>After Maps loads:</strong> wait for Street View to fully open,
        then copy the URL from the address bar and paste it below.
      </div>
      <div class="step2-wrap">
        <label class="step2-label">Step 2 — Paste the Maps URL here</label>
        <textarea class="step2-input" id="step2Input"
          placeholder="https://www.google.com/maps/@…!6shttps:%2F%2Flh3…"
          autocomplete="off" autocorrect="off" spellcheck="false"
          oninput="onStep2Change()"></textarea>
      </div>
    </div>

    <!-- Preview button -->
    <div class="action-row">
      <button class="preview-btn" id="previewBtn" onclick="startPreview()">👁 Preview 360°</button>
    </div>

    <!-- Zoom pills -->
    <div class="zoom-wrap" id="zoomWrap">
      <label class="label">Resolution <span style="font-size:.5rem;color:var(--muted)">(Street View only)</span></label>
      <div class="zoom-pills">
        <button class="zpill" data-z="1" onclick="selZoom(this)">Z1<span class="res">~512px</span></button>
        <button class="zpill" data-z="2" onclick="selZoom(this)">Z2<span class="res">~1K</span></button>
        <button class="zpill active" data-z="3" onclick="selZoom(this)">Z3<span class="res">~2K</span></button>
        <button class="zpill" data-z="4" onclick="selZoom(this)">Z4<span class="res">~4K</span></button>
        <button class="zpill" data-z="5" onclick="selZoom(this)">Z5<span class="res">~13K</span></button>
      </div>
    </div>

    <button class="dl-btn" id="dlBtn" onclick="startDownload()">⬇ Download Full-Res Panorama</button>
    <button class="cancel-btn" id="cancelBtn" onclick="cancelDownload()">✕ Cancel</button>

    <div class="progress-section" id="progressSection">
      <div class="prog-header">
        <span class="prog-label" id="progLabel">Fetching tiles…</span>
        <span class="prog-pct" id="progPct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <div class="tile-grid" id="tileGrid"></div>
    </div>

    <div class="status-bar" id="statusBar"></div>
  </div>
</div>

<div id="bulkTab" class="tab-content hidden">

      <textarea id="bulkInput" placeholder="https://maps.google.com/…&#10;https://earth.app.goo.gl/…&#10;https://maps.google.com/…" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
    </div>
    <div class="bulk-actions">
      <button class="bulk-parse" onclick="parseBulkUrls()">Parse URLs</button>
      <button class="bulk-dl-all" id="bulkDlAll" onclick="bulkDownloadAll()">⬇ Download All</button>
    </div>
    <div id="bulkQueue"></div>
    <div class="status-bar" id="bulkStatus"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let cancelRequested = false;
let selZoomVal = 3;
let currentDet = null;
let currentMapsUrl = null;
let pannViewer = null;
let bulkQueue = [];
let bulkRunning = false;

const TILE = 512;
const ZOOM_FALLBACK = {
  1:{cols:2,rows:1}, 2:{cols:4,rows:2}, 3:{cols:8,rows:4},
  4:{cols:16,rows:8}, 5:{cols:32,rows:16}
};

// ═══════════════════════════════════════════
// TAB
// ═══════════════════════════════════════════
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active', (i===0&&t==='single')||(i===1&&t==='bulk')));
  document.getElementById('singleTab').classList.toggle('hidden', t!=='single');
  document.getElementById('bulkTab').classList.toggle('hidden', t!=='bulk');
}

// ═══════════════════════════════════════════
// PROTOBUF DECODER (Earth links)
// ═══════════════════════════════════════════
function readVarint(b,p){
  let r=0,s=0;
  while(p<b.length){const v=b[p++];r|=(v&127)<<s;s+=7;if(!(v&128))break;}
  return{value:r,pos:p};
}
function parseProto(bytes){
  const out=[];let p=0;
  while(p<bytes.length){
    try{
      const t=readVarint(bytes,p);p=t.pos;if(p>=bytes.length)break;
      const wt=t.value&7,fn=t.value>>3;
      if(wt===0){const v=readVarint(bytes,p);p=v.pos;out.push({field:fn,type:'varint',value:v.value});}
      else if(wt===2){
        const l=readVarint(bytes,p);p=l.pos;
        const d=bytes.slice(p,p+l.value);p+=l.value;
        let s='';try{s=new TextDecoder('utf-8',{fatal:true}).decode(d);}catch(e){}
        out.push({field:fn,type:'bytes',data:d,str:s});
      }else if(wt===5){p+=4;}else if(wt===1){p+=8;}else break;
    }catch(e){break;}
  }
  return out;
}
function isPanoId(s){
  if(!s||typeof s!=='string')return false;s=s.trim();
  return /^[A-Za-z0-9_\-]{22}$/.test(s)||/^CI[A-Za-z0-9_\-]{18,32}$/.test(s)||
         /^AF1Q[A-Za-z0-9_\-]{36,}$/.test(s)||/^CAoS[A-Za-z0-9+\/=]{16,}$/.test(s);
}
function isUserPanoId(s){
  return /^CI[A-Za-z0-9_\-]{18,32}$/.test(s)||/^AF1Q[A-Za-z0-9_\-]{36,}$/.test(s);
}
function findPanoInBytes(bytes,depth){
  if(!depth)depth=0;if(depth>8)return null;
  for(const e of parseProto(bytes)){
    if(e.type==='bytes'){
      if(e.str&&isPanoId(e.str))return e.str;
      const n=findPanoInBytes(e.data,depth+1);if(n)return n;
    }
  }
  return null;
}
function tryB64Pano(b64){
  let s=b64.replace(/-/g,'+').replace(/_/g,'/');
  s+='='.repeat((4-s.length%4)%4);
  try{return findPanoInBytes(Uint8Array.from(atob(s),c=>c.charCodeAt(0)));}catch(e){return null;}
}

// ═══════════════════════════════════════════
// URL EXTRACTION
// ═══════════════════════════════════════════
function extractNav(url){
  const cm=url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  const hm=url.match(/([\d.]+)h[,\/]/);
  const tm=url.match(/([\d.]+)t[,\/]/);
  return{
    coords:cm?{lat:parseFloat(cm[1]),lng:parseFloat(cm[2])}:null,
    heading:hm?parseFloat(hm[1]):0,
    tilt:tm?parseFloat(tm[1]):90
  };
}
function cleanLh3Url(raw){
  let url=raw;
  url=url.replace(/=w\d+[^"'\s]*/,'=w16000-h8000-k-no');
  url=url.replace(/-pi[\d.\-]+/g,'').replace(/-ya[\d.\-]+/g,'')
         .replace(/-ro[\d.\-]+/g,'').replace(/-fo\d+/g,'');
  return url;
}
function extractFromUrl(raw){
  const url=raw.trim();if(!url)return null;
  if(isPanoId(url))return{panoId:url,panoType:isUserPanoId(url)?'user':'sv',source:'Direct pano ID'};
  const lm=url.match(/[?&]link=([^&\s]+)/i);
  const workUrl=lm?decodeURIComponent(lm[1]):url;
  const nav=extractNav(workUrl);
  const stm=workUrl.match(/!2e(\d+)/);
  const isUser=(stm&&parseInt(stm[1])>=10);
  let lh3Url=null;
  const lh3m=workUrl.match(/!6s(https?:[^!]+lh3\.googleusercontent\.com[^!]+)/);
  if(lh3m){
    let r='';try{r=decodeURIComponent(lh3m[1]);}catch(e){r=lh3m[1];}
    lh3Url=cleanLh3Url(r);
  }
  const bm=workUrl.match(/!1s([^!&?#\s]+)/);
  if(bm){
    const id=decodeURIComponent(bm[1]);
    if(isPanoId(id)){
      return{panoId:id,panoType:(isUser||isUserPanoId(id))?'user':'sv',lh3Url,...nav,source:'Google Maps !1s'};
    }
  }
  const pm=workUrl.match(/[?&]panoid=([^&\s]+)/i);
  if(pm&&isPanoId(pm[1]))
    return{panoId:pm[1],panoType:isUserPanoId(pm[1])?'user':'sv',...nav,source:'panoid= param'};
  const pp=workUrl.match(/\/p\/([A-Za-z0-9_\-]{20,})/);
  if(pp&&isPanoId(pp[1]))
    return{panoId:pp[1],panoType:'user',...nav,source:'/p/ path'};
  const dm=workUrl.match(/[?\/]data=([A-Za-z0-9+\/=%_\-]+)/);
  if(dm){
    let ds=dm[1];try{ds=decodeURIComponent(ds);}catch(e){}
    const chunks=ds.split(/[^A-Za-z0-9+\/=_\-]/).filter(c=>c.length>=8);
    for(const c of chunks){
      if(isPanoId(c))return{panoId:c,panoType:isUserPanoId(c)?'user':'sv',...nav,source:'data= raw'};
      const f=tryB64Pano(c);if(f)return{panoId:f,panoType:isUserPanoId(f)?'user':'sv',...nav,source:'Earth protobuf'};
    }
    const wf=tryB64Pano(ds);
    if(wf)return{panoId:wf,panoType:isUserPanoId(wf)?'user':'sv',...nav,source:'Earth protobuf (full)'};
  }
  if(nav.coords)return{panoId:null,panoType:null,...nav,source:'Coordinates only'};
  return null;
}

// ═══════════════════════════════════════════
// Z5 FIX: Fetch exact tile grid from metadata
// ═══════════════════════════════════════════
async function fetchSVMeta(panoId, zoom) {
  try {
    const r = await fetch(`https://cbk0.google.com/cbk?output=json&panoid=${encodeURIComponent(panoId)}`);
    if (!r.ok) throw new Error('meta fail');
    const d = await r.json();
    const lat = parseFloat(d.Location?.lat || d.location?.lat || 0);
    const lng = parseFloat(d.Location?.lng || d.location?.lng || 0);

    // Prefer world_size from tiles array — this gives exact dims per zoom level
    // tiles[0] = Z1, tiles[1] = Z2 ... tiles[4] = Z5
    const tiles = d.Data?.tiles || d.data?.tiles;
    if (tiles && tiles[zoom - 1]) {
      const t = tiles[zoom - 1];
      const exactW = t.world_size?.width || t.worldSize?.width;
      const exactH = t.world_size?.height || t.worldSize?.height;
      if (exactW && exactH) {
        return {cols: Math.ceil(exactW/TILE), rows: Math.ceil(exactH/TILE), exactW, exactH, lat, lng};
      }
    }

    // Fallback: metadata returns Z5 full-res dimensions, scale down to requested zoom
    const fullW = d.Data?.image_width || d.data?.image_width;
    const fullH = d.Data?.image_height || d.data?.image_height;
    if (fullW && fullH) {
      const scale = Math.pow(2, 5 - zoom); // Z5=÷1, Z4=÷2, Z3=÷4, Z2=÷8, Z1=÷16
      const exactW = Math.round(fullW / scale);
      const exactH = Math.round(fullH / scale);
      return {cols: Math.ceil(exactW/TILE), rows: Math.ceil(exactH/TILE), exactW, exactH, lat, lng};
    }
  } catch(e) { console.warn('fetchSVMeta failed:', e); }
  // Hard fallback — metadata unavailable, use corrected static grid
  return {...ZOOM_FALLBACK[zoom], exactW: null, exactH: null, lat: 0, lng: 0};
}

// autoCrop: canvas is now pre-sized to exact dims, this is just a safety net
// for edge cases where metadata was unavailable
function autoCrop(canvas, ctx, exactW, exactH) {
  // Canvas is already sized correctly if we had metadata — just return it
  return {canvas, w: canvas.width, h: canvas.height};
}

// ═══════════════════════════════════════════
// METADATA INJECTION (XMP + EXIF GPS)
// ═══════════════════════════════════════════
function buildXMP(w, h, lat, lng) {
  function xmpDMS(val, pos, neg) {
    const a=Math.abs(val), d=Math.floor(a), m=(a-d)*60;
    return `${d},${m.toFixed(6)}${val>=0?pos:neg}`;
  }
  let gpsDesc = '';
  if (lat || lng) {
    gpsDesc = ` xmlns:exif="http://ns.adobe.com/exif/1.0/"` +
      ` exif:GPSLatitude="${xmpDMS(lat,'N','S')}"` +
      ` exif:GPSLongitude="${xmpDMS(lng,'E','W')}"`;
  }
  return '<?xpacket begin="\xEF\xBB\xBF" id="W5M0MpCehiHzreSzNTczkc9d"?>' +
    '<x:xmpmeta xmlns:x="adobe:ns:meta/">' +
    '<rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#">' +
    `<rdf:Description rdf:about=""` +
    ` xmlns:GPano="http://ns.google.com/photos/1.0/panorama/"` +
    gpsDesc +
    ` GPano:UsePanoramaViewer="True"` +
    ` GPano:ProjectionType="equirectangular"` +
    ` GPano:FullPanoWidthPixels="${w}"` +
    ` GPano:FullPanoHeightPixels="${h}"` +
    ` GPano:CroppedAreaImageWidthPixels="${w}"` +
    ` GPano:CroppedAreaImageHeightPixels="${h}"` +
    ` GPano:CroppedAreaLeftPixels="0"` +
    ` GPano:CroppedAreaTopPixels="0"` +
    `/>` +
    '</rdf:RDF></x:xmpmeta>' +
    '<?xpacket end="w"?>';
}

function buildExifGPSApp1(lat, lng) {
  if (!lat && !lng) return null;
  function toDMS(v) {
    const a=Math.abs(v), d=Math.floor(a), mf=(a-d)*60, m=Math.floor(mf), s=Math.round((mf-m)*60*1000);
    return [[d,1],[m,1],[s,1000]];
  }
  const latRef = lat>=0?'N':'S', lngRef = lng>=0?'E':'W';
  const latDMS = toDMS(lat), lngDMS = toDMS(lng);
  // Layout: TIFF(8) + IFD0(18) + GPSIFD(54) + data(52) = 132
  const buf = new ArrayBuffer(132);
  const dv = new DataView(buf);
  const u8 = new Uint8Array(buf);
  let p = 0;
  u8[p++]=0x49;u8[p++]=0x49; // "II" LE
  dv.setUint16(p,42,true);p+=2;
  dv.setUint32(p,8,true);p+=4; // IFD0 at 8
  // IFD0
  dv.setUint16(p,1,true);p+=2; // 1 entry
  dv.setUint16(p,0x8825,true);p+=2; // GPS IFD tag
  dv.setUint16(p,4,true);p+=2;       // LONG
  dv.setUint32(p,1,true);p+=4;
  dv.setUint32(p,26,true);p+=4;      // GPS IFD at 26
  dv.setUint32(p,0,true);p+=4;       // next IFD=0
  // GPS IFD at 26
  dv.setUint16(p,4,true);p+=2; // 4 entries
  let dOff = 80; // data area start: 26+2+4*12+4
  // GPSLatitudeRef: ASCII, 2, inline
  dv.setUint16(p,0x0001,true);p+=2; dv.setUint16(p,2,true);p+=2;
  dv.setUint32(p,2,true);p+=4;
  u8[p]=latRef.charCodeAt(0);u8[p+1]=0;u8[p+2]=0;u8[p+3]=0;p+=4;
  // GPSLatitude: RATIONAL, 3, offset
  dv.setUint16(p,0x0002,true);p+=2; dv.setUint16(p,5,true);p+=2;
  dv.setUint32(p,3,true);p+=4; dv.setUint32(p,dOff,true);p+=4;
  for(const[n,d] of latDMS){dv.setUint32(dOff,n,true);dv.setUint32(dOff+4,d,true);dOff+=8;}
  // GPSLongitudeRef: ASCII, 2, inline
  dv.setUint16(p,0x0003,true);p+=2; dv.setUint16(p,2,true);p+=2;
  dv.setUint32(p,2,true);p+=4;
  u8[p]=lngRef.charCodeAt(0);u8[p+1]=0;u8[p+2]=0;u8[p+3]=0;p+=4;
  // GPSLongitude: RATIONAL, 3, offset
  dv.setUint16(p,0x0004,true);p+=2; dv.setUint16(p,5,true);p+=2;
  dv.setUint32(p,3,true);p+=4; dv.setUint32(p,dOff,true);p+=4;
  for(const[n,d] of lngDMS){dv.setUint32(dOff,n,true);dv.setUint32(dOff+4,d,true);dOff+=8;}
  dv.setUint32(p,0,true); // next IFD=0
  // Wrap in APP1
  const exifHdr = [0x45,0x78,0x69,0x66,0,0]; // "Exif\0\0"
  const pLen = 6 + 132;
  const app1 = new Uint8Array(4 + pLen);
  app1[0]=0xFF;app1[1]=0xE1;
  const mLen = pLen+2;
  app1[2]=(mLen>>8)&0xFF;app1[3]=mLen&0xFF;
  exifHdr.forEach((b,i)=>app1[4+i]=b);
  app1.set(u8,10);
  return app1;
}

function injectMetadata(jpegBytes, w, h, lat, lng) {
  const xmp = buildXMP(w, h, lat, lng);
  const ns = 'http://ns.adobe.com/xap/1.0/\x00';
  const full = ns + xmp;
  const xb = new Uint8Array(full.length);
  for(let i=0;i<full.length;i++) xb[i]=full.charCodeAt(i)&0xFF;
  const xmpLen = xb.length+2;
  const xmpApp1 = new Uint8Array(4+xb.length);
  xmpApp1[0]=0xFF;xmpApp1[1]=0xE1;
  xmpApp1[2]=(xmpLen>>8)&0xFF;xmpApp1[3]=xmpLen&0xFF;
  xmpApp1.set(xb,4);

  const exifApp1 = buildExifGPSApp1(lat, lng);
  const extra = (exifApp1 ? exifApp1.length : 0) + xmpApp1.length;
  const out = new Uint8Array(2 + extra + jpegBytes.length - 2);
  out.set(jpegBytes.slice(0,2), 0);
  let pos = 2;
  if (exifApp1) { out.set(exifApp1, pos); pos += exifApp1.length; }
  out.set(xmpApp1, pos); pos += xmpApp1.length;
  out.set(jpegBytes.slice(2), pos);
  return out;
}

// ═══════════════════════════════════════════
// CANVAS → JPEG BYTES
// ═══════════════════════════════════════════
async function canvasToJpeg(canvas, q) {
  return new Promise((res,rej)=>{
    canvas.toBlob(b=>{
      if(!b){rej(new Error('toBlob fail'));return;}
      b.arrayBuffer().then(buf=>res(new Uint8Array(buf))).catch(rej);
    },'image/jpeg',q||0.95);
  });
}

function saveBytes(bytes, name) {
  // On Android app: use native bridge to save to Pictures/PanoView (shows in gallery)
  if (window.AndroidSave) {
    let binary = '';
    const chunk = 8192;
    for (let i = 0; i < bytes.length; i += chunk) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    }
    const b64 = 'data:image/jpeg;base64,' + btoa(binary);
    window.AndroidSave.saveImage(b64, name);
    return;
  }
  // Browser fallback
  const blob = new Blob([bytes],{type:'image/jpeg'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}

// ═══════════════════════════════════════════
// PREVIEW
// ═══════════════════════════════════════════
async function startPreview() {
  if (!currentDet || !currentDet.panoId) return;
  const modal = document.getElementById('previewModal');
  const loading = document.getElementById('previewLoading');
  const loadingTxt = document.getElementById('previewLoadingText');
  modal.classList.add('open');
  loading.classList.remove('hidden');
  if (pannViewer) { try{pannViewer.destroy();}catch(e){} pannViewer=null; }

  try {
    let imageUrl = null;
    if (currentDet.panoType === 'sv') {
      loadingTxt.textContent = 'STITCHING PREVIEW (Z2)…';
      imageUrl = await stitchPreview(currentDet.panoId, 2);
    } else if (currentDet.lh3Url) {
      loadingTxt.textContent = 'LOADING PANORAMA…';
      const previewLh3 = currentDet.lh3Url.replace('=w16000-h8000','=w4096-h2048');
      imageUrl = await fetchAsObjectUrl(previewLh3);
    } else {
      loading.classList.add('hidden');
      setStatus('No image URL available for preview.', 'error');
      modal.classList.remove('open');
      return;
    }
    loading.classList.add('hidden');
    pannViewer = pannellum.viewer('pannellumContainer', {
      type: 'equirectangular',
      panorama: imageUrl,
      autoLoad: true,
      compass: false,
      northOffset: currentDet.heading || 0,
      mouseZoom: true,
      hfov: 100,
      minHfov: 30,
      maxHfov: 120,
    });
  } catch(e) {
    loading.classList.add('hidden');
    modal.classList.remove('open');
    setStatus('Preview failed: ' + e.message, 'error');
  }
}

async function stitchPreview(panoId, zoom) {
  const {cols, rows} = ZOOM_FALLBACK[zoom];
  const canvas = document.createElement('canvas');
  canvas.width = cols*TILE; canvas.height = rows*TILE;
  const ctx = canvas.getContext('2d');
  const loads = [];
  for (let y=0; y<rows; y++) for (let x=0; x<cols; x++) {
    loads.push(new Promise(res=>{
      const img = new Image(); img.crossOrigin='anonymous';
      img.onload = ()=>{ctx.drawImage(img,x*TILE,y*TILE,TILE,TILE);res();};
      img.onerror = ()=>res();
      img.src = `https://cbk0.google.com/cbk?output=tile&panoid=${encodeURIComponent(panoId)}&zoom=${zoom}&x=${x}&y=${y}`;
    }));
  }
  await Promise.all(loads);
  return canvas.toDataURL('image/jpeg', 0.8);
}

async function fetchAsObjectUrl(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('fetch failed');
  const blob = await r.blob();
  return URL.createObjectURL(blob);
}

function closePreview() {
  if (pannViewer) { try{pannViewer.destroy();}catch(e){} pannViewer=null; }
  document.getElementById('previewModal').classList.remove('open');
}

// ═══════════════════════════════════════════
// DOWNLOAD — USER PANO
// ═══════════════════════════════════════════
async function downloadUserPano(det) {
  const {panoId, lh3Url, coords} = det;
  const lat = coords?.lat || 0, lng = coords?.lng || 0;
  const tryUrls = [];
  if (lh3Url) tryUrls.push({url:lh3Url, label:'direct lh3 full-res'});
  tryUrls.push({url:`https://lh3.googleusercontent.com/p/${encodeURIComponent(panoId)}=w16000-h8000-k-no`,label:'lh3/p/ 16K'});
  tryUrls.push({url:`https://lh3.googleusercontent.com/p/${encodeURIComponent(panoId)}=w8000-h4000-k-no`,label:'lh3/p/ 8K'});

  for (const {url, label} of tryUrls) {
    setStatus(`Fetching: ${label}…`, 'info');
    try {
      const r = await fetch(url); if (!r.ok) continue;
      const bytes = new Uint8Array(await r.arrayBuffer());
      const header = new TextDecoder('latin1').decode(bytes.slice(0,65536));
      const hasGPano = header.includes('GPano')||header.includes('PhotoSphere');
      const fname = `panoview_user_${panoId.slice(0,18)}.jpg`;
      if (hasGPano && !lat && !lng) {
        setStatus(`Original has Photo Sphere XMP — saving as-is.\n${fname}`, 'success');
        saveBytes(bytes, fname);
      } else {
        setStatus('Injecting XMP + GPS metadata…', 'info');
        let w=16000, h=8000;
        try { const img=await loadImgBytes(bytes); w=img.naturalWidth; h=img.naturalHeight; } catch(e){}
        const out = injectMetadata(bytes, w, h, lat, lng);
        setStatus(`Saved: ${fname}\n${w}×${h}px · XMP + GPS injected`, 'success');
        saveBytes(out, fname);
      }
      return true;
    } catch(e) { continue; }
  }
  return false;
}

function loadImgBytes(bytes) {
  return new Promise((res,rej)=>{
    const blob = new Blob([bytes],{type:'image/jpeg'});
    const u = URL.createObjectURL(blob);
    const img = new Image();
    img.onload=()=>{URL.revokeObjectURL(u);res(img);};
    img.onerror=()=>{URL.revokeObjectURL(u);rej();};
    img.src=u;
  });
}

// ═══════════════════════════════════════════
// DOWNLOAD — STREET VIEW TILE STITCH
// ═══════════════════════════════════════════
async function downloadSVPano(det) {
  const {panoId, coords, heading} = det;
  const zoom = selZoomVal;

  setStatus(`Fetching tile metadata for Z${zoom}…`, 'info');
  const meta = await fetchSVMeta(panoId, zoom);
  const {cols, rows, exactW, exactH} = meta;
  const metaLat = meta.lat || coords?.lat || 0;
  const metaLng = meta.lng || coords?.lng || 0;
  const total = cols * rows;

  document.getElementById('dlBtn').disabled = true;
  document.getElementById('cancelBtn').classList.add('show');
  document.getElementById('progressSection').classList.add('show');
  document.getElementById('progLabel').textContent = `Fetching ${total} tiles (Z${zoom})…`;
  setProgress(0, total);

  const grid = document.getElementById('tileGrid'); grid.innerHTML='';
  const cells = [];
  for (let i=0; i<total; i++) {
    const c=document.createElement('div'); c.className='tile-cell';
    grid.appendChild(c); cells.push(c);
  }

  const canvas = document.createElement('canvas');
  // Size canvas to exact content dimensions (not full tile grid) to avoid black edges
  // If metadata gave us exact dims use those, else fall back to tile grid size
  const canvasW = exactW || cols*TILE;
  const canvasH = exactH || rows*TILE;
  canvas.width = canvasW; canvas.height = canvasH;
  const ctx = canvas.getContext('2d');
  let done=0, failed=0, idx=0;

  setStatus(`Pano: ${panoId}\nZ${zoom} · ${cols}×${rows} tiles · ${canvasW}×${canvasH}px`, 'info');

  async function worker() {
    while (idx < total && !cancelRequested) {
      const i = idx++;
      const x = i%cols, y = Math.floor(i/cols);
      cells[i].className = 'tile-cell loading';
      const url = `https://cbk0.google.com/cbk?output=tile&panoid=${encodeURIComponent(panoId)}&zoom=${zoom}&x=${x}&y=${y}`;
      const res = await new Promise(resolve=>{
        const img=new Image(); img.crossOrigin='anonymous';
        img.onload=()=>resolve({ok:true,img});
        img.onerror=()=>resolve({ok:false});
        img.src=url;
      });
      if (cancelRequested) break;
      if (res.ok) { ctx.drawImage(res.img,x*TILE,y*TILE,TILE,TILE); cells[i].className='tile-cell done'; }
      else { cells[i].className='tile-cell fail'; failed++; }
      done++;
      setProgress(done, total);
      document.getElementById('progLabel').textContent = `${done}/${total} tiles · ${failed} failed`;
    }
  }

  await Promise.all(Array.from({length:8}, ()=>worker()));
  if (cancelRequested) return;

  document.getElementById('dlBtn').disabled = false;
  document.getElementById('cancelBtn').classList.remove('show');

  if (failed === total) {
    setStatus('All tiles failed.\n• Network issue or CORS\n• Pano may be private\n• Try lower zoom level', 'error');
    return;
  }

  setStatus('Stitching done. Auto-cropping and injecting metadata…', 'success');
  const cropped = autoCrop(canvas, ctx, exactW, exactH);
  const {canvas: finalCanvas, w, h} = cropped;
  const fname = `panoview_sv_${panoId.slice(0,18)}_z${zoom}.jpg`;

  try {
    const jb = await canvasToJpeg(finalCanvas, 0.96);
    const out = injectMetadata(jb, w, h, metaLat, metaLng);
    saveBytes(out, fname);
    setStatus(`Saved: ${fname}\n${w}×${h}px · ${total-failed}/${total} tiles · XMP + GPS injected`, 'success');
  } catch(e) {
    try {
      const du = finalCanvas.toDataURL('image/jpeg', 0.96);
      const a = document.createElement('a'); a.href=du; a.download=fname; a.click();
      setStatus('Saved (fallback mode — GPS not injected).', 'warn');
    } catch(e2) {
      setStatus('Export blocked. This can happen with CORS restrictions.', 'error');
    }
  }
}

// ═══════════════════════════════════════════
// BULK DOWNLOAD
// ═══════════════════════════════════════════
function parseBulkUrls() {
  const lines = document.getElementById('bulkInput').value.split('\n')
    .map(s=>s.trim()).filter(s=>s.length>0);
  if (!lines.length) return;
  bulkQueue = lines.map((url,i)=>({
    id:i, url,
    det: extractFromUrl(url),
    status:'waiting', msg:''
  }));
  renderBulkQueue();
  document.getElementById('bulkDlAll').classList.add('show');
}

function renderBulkQueue() {
  const el = document.getElementById('bulkQueue');
  el.innerHTML = '';
  for (const item of bulkQueue) {
    const d = item.det;
    const typeStr = !d ? '❓ Unknown' :
      !d.panoId ? '📍 Coords only' :
      d.panoType==='sv' ? '🗺 Street View' : '📸 User Pano';
    const div = document.createElement('div');
    div.className = 'queue-item';
    div.id = `qi-${item.id}`;
    div.innerHTML = `
      <div class="qi-url">${item.url}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px;">
        <div class="qi-info" style="color:var(--muted)">${typeStr}${d?.panoId?' · '+d.panoId.slice(0,14)+'…':''}</div>
        <div class="qi-status ${item.status}">${item.status.toUpperCase()}</div>
      </div>
      ${item.msg?`<div style="font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);margin-top:4px">${item.msg}</div>`:''}
    `;
    el.appendChild(div);
  }
}

function updateQueueItem(id) {
  const item = bulkQueue.find(i=>i.id===id);
  if (!item) return;
  const el = document.getElementById(`qi-${id}`);
  if (!el) return;
  const statusEl = el.querySelector('.qi-status');
  if (statusEl) { statusEl.className=`qi-status ${item.status}`; statusEl.textContent=item.status.toUpperCase(); }
  const msgEls = el.querySelectorAll('div:last-child');
  // Update last child if it's a message
  if (item.msg && msgEls.length) {
    const last = msgEls[msgEls.length-1];
    if (!last.classList.contains('qi-info')) last.textContent = item.msg;
  }
}

async function bulkDownloadAll() {
  if (bulkRunning) return;
  bulkRunning = true;
  const btn = document.getElementById('bulkDlAll');
  btn.textContent = '⏳ Downloading…'; btn.disabled = true;
  const bulkStat = document.getElementById('bulkStatus');
  bulkStat.className='status-bar show info';
  for (const item of bulkQueue) {
    if (item.status === 'done') continue;
    const det = item.det;
    if (!det || !det.panoId) {
      item.status='skipped'; item.msg='No pano ID found'; updateQueueItem(item.id); continue;
    }
    item.status='fetching'; updateQueueItem(item.id);
    bulkStat.textContent = `Downloading ${item.id+1}/${bulkQueue.length}…`;
    try {
      if (det.panoType === 'user') {
        const ok = await downloadUserPanoBulk(det, item.id);
        item.status = ok ? 'done' : 'error';
        item.msg = ok ? 'Downloaded ✓' : 'Could not fetch image';
      } else {
        await downloadSVPanoBulk(det, item.id);
        item.status = 'done'; item.msg = 'Downloaded ✓';
      }
    } catch(e) {
      item.status='error'; item.msg = e.message;
    }
    updateQueueItem(item.id);
    await new Promise(r=>setTimeout(r,500)); // small delay between downloads
  }
  bulkRunning = false;
  btn.textContent='⬇ Download All'; btn.disabled=false;
  const done = bulkQueue.filter(i=>i.status==='done').length;
  bulkStat.className=`status-bar show ${done===bulkQueue.length?'success':'warn'}`;
  bulkStat.textContent = `Complete: ${done}/${bulkQueue.length} downloaded.`;
}

async function downloadUserPanoBulk(det, qid) {
  const {panoId, lh3Url, coords} = det;
  const lat=coords?.lat||0, lng=coords?.lng||0;
  const tryUrls=[];
  if(lh3Url)tryUrls.push({url:lh3Url});
  tryUrls.push({url:`https://lh3.googleusercontent.com/p/${encodeURIComponent(panoId)}=w16000-h8000-k-no`});
  for(const{url}of tryUrls){
    try{
      const r=await fetch(url);if(!r.ok)continue;
      const bytes=new Uint8Array(await r.arrayBuffer());
      const hdr=new TextDecoder('latin1').decode(bytes.slice(0,65536));
      const fname=`panoview_user_${panoId.slice(0,18)}.jpg`;
      let w=16000,h=8000;
      try{const img=await loadImgBytes(bytes);w=img.naturalWidth;h=img.naturalHeight;}catch(e){}
      const out=injectMetadata(bytes,w,h,lat,lng);
      saveBytes(out,fname);return true;
    }catch(e){continue;}
  }
  return false;
}

async function downloadSVPanoBulk(det, qid) {
  const zoom = selZoomVal;
  const meta = await fetchSVMeta(det.panoId, zoom);
  const {cols,rows,exactW,exactH}=meta;
  const lat=meta.lat||det.coords?.lat||0, lng=meta.lng||det.coords?.lng||0;
  const canvas=document.createElement('canvas');
  canvas.width=exactW||cols*TILE; canvas.height=exactH||rows*TILE;
  const ctx=canvas.getContext('2d');
  const total=cols*rows;
  const loads=[];
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
    loads.push(new Promise(res=>{
      const img=new Image();img.crossOrigin='anonymous';
      img.onload=()=>{ctx.drawImage(img,x*TILE,y*TILE,TILE,TILE);res();};
      img.onerror=()=>res();
      img.src=`https://cbk0.google.com/cbk?output=tile&panoid=${encodeURIComponent(det.panoId)}&zoom=${zoom}&x=${x}&y=${y}`;
    }));
  }
  await Promise.all(loads);
  const{canvas:fc,w,h}=autoCrop(canvas,ctx,exactW,exactH);
  const jb=await canvasToJpeg(fc,0.95);
  const out=injectMetadata(jb,w,h,lat,lng);
  const fname=`panoview_sv_${det.panoId.slice(0,18)}_z${zoom}.jpg`;
  saveBytes(out,fname);
}

// ═══════════════════════════════════════════
// MAIN DOWNLOAD DISPATCHER
// ═══════════════════════════════════════════
async function startDownload() {
  const urlVal = document.getElementById('urlInput').value.trim();
  if (!currentDet && urlVal) currentDet = extractFromUrl(urlVal);
  if (!currentDet || !currentDet.panoId) {
    setStatus('No pano ID found. Paste a valid Maps, Street View or Earth URL.', 'error');
    return;
  }
  cancelRequested = false;
  document.getElementById('progressSection').classList.remove('show');
  if (currentDet.panoType === 'user') {
    document.getElementById('dlBtn').disabled = true;
    const ok = await downloadUserPano(currentDet);
    document.getElementById('dlBtn').disabled = false;
    if (!ok) {
      showMapsBox(currentDet);
      setStatus('Could not fetch directly.\n1. Tap "Open in Maps" above\n2. Wait for Street View to load\n3. Copy the full address bar URL\n4. Paste in Step 2 field', 'warn');
    }
  } else {
    await downloadSVPano(currentDet);
  }
}

// ═══════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════
function selZoom(el) {
  document.querySelectorAll('.zpill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); selZoomVal = parseInt(el.dataset.z);
}
function setStatus(msg, type) {
  const b=document.getElementById('statusBar');
  b.textContent=msg; b.className=`status-bar show ${type||'info'}`;
}
function hideStatus(){document.getElementById('statusBar').className='status-bar';}
function setProgress(done, total) {
  const p=Math.round(done/total*100);
  document.getElementById('progFill').style.width=p+'%';
  document.getElementById('progPct').textContent=p+'%';
}
function cancelDownload() {
  cancelRequested=true; setStatus('Cancelled.','error');
  document.getElementById('dlBtn').disabled=false;
  document.getElementById('cancelBtn').classList.remove('show');
  document.getElementById('progressSection').classList.remove('show');
}
function buildMapsUrl(det) {
  if(!det)return null;
  const lat=(det.coords?.lat)||0, lng=(det.coords?.lng)||0;
  const h=((det.heading)||0).toFixed(2), t=((det.tilt)||90).toFixed(2);
  const id=det.panoId;
  if(id&&isUserPanoId(id))
    return `https://www.google.com/maps/@${lat},${lng},3a,75y,${h}h,${t}t/data=!3m6!1e1!3m4!1s${encodeURIComponent(id)}!2e10!7i8000!8i4000`;
  if(id)
    return `https://www.google.com/maps/@${lat},${lng},3a,75y,${h}h,${t}t/data=!3m4!1e1!3m2!1s${encodeURIComponent(id)}!2e0`;
  return `https://www.google.com/maps/@${lat},${lng},3a,75y,${h}h,${t}t`;
}
function showMapsBox(det) {
  const url=buildMapsUrl(det);if(!url)return;
  currentMapsUrl=url;
  document.getElementById('mapsLink').href=url;
  document.getElementById('mapsBox').classList.add('show');
}
function openInMaps() {
  if(!currentMapsUrl)return;
  const w=window.open(currentMapsUrl,'_blank');
  if(!w)setStatus('Popup blocked — use the Copy / Open Link button.','warn');
}
function onStep2Change() {
  const val=document.getElementById('step2Input').value.trim();if(!val)return;
  const r=extractFromUrl(val);
  if(!r){setStatus('Could not parse this Maps URL. Copy the full address bar URL after Street View loads.','error');return;}
  if(r.lh3Url){
    currentDet=r;
    setStatus('Token found. Press Download to fetch the full-res image.','success');
    const btn=document.getElementById('dlBtn');
    btn.className='dl-btn user';btn.textContent='⬇ Download User Panorama (Full-Res)';
    document.getElementById('previewBtn').classList.add('show');
  } else if(r.panoId&&r.panoType==='sv'){
    currentDet=r; setStatus('Official Street View pano from Maps URL.','info');
    document.getElementById('zoomWrap').classList.remove('dim');
    const btn=document.getElementById('dlBtn');
    btn.className='dl-btn';btn.textContent='⬇ Download Panorama (Tile Stitch)';
    document.getElementById('previewBtn').classList.add('show');
  } else {
    setStatus('Pano found but no image token yet. Wait for Street View to fully load.','warn');
  }
}
function onUrlChange() {
  const val=document.getElementById('urlInput').value;
  ['badgeSV','badgeUser','badgeCoords','mapsBox'].forEach(id=>
    document.getElementById(id).classList.remove('show'));
  hideStatus(); currentDet=null; currentMapsUrl=null;
  document.getElementById('previewBtn').classList.remove('show');

  if(!val.trim()){
    document.getElementById('zoomWrap').classList.remove('dim');
    const btn=document.getElementById('dlBtn');
    btn.className='dl-btn';btn.textContent='⬇ Download Full-Res Panorama';
    return;
  }
  const r=extractFromUrl(val);if(!r)return;

  if(r.panoId&&r.panoType==='sv'){
    currentDet=r;
    document.getElementById('svPanoId').textContent=r.panoId;
    document.getElementById('svSource').textContent=`↳ Official Street View · ${r.source}`;
    document.getElementById('badgeSV').classList.add('show');
    document.getElementById('zoomWrap').classList.remove('dim');
    document.getElementById('previewBtn').classList.add('show');
    const btn=document.getElementById('dlBtn');
    btn.className='dl-btn';btn.textContent='⬇ Download Panorama (Tile Stitch)';

  } else if(r.panoId&&r.panoType==='user'){
    currentDet=r;
    document.getElementById('userPanoId').textContent=r.panoId;
    const hasToken=!!r.lh3Url;
    document.getElementById('userSource').textContent=
      `↳ User 360° · ${r.source}`+(hasToken?' · ✓ direct URL':' · ⚠ no token — use Maps step');
    document.getElementById('badgeUser').classList.add('show');
    document.getElementById('zoomWrap').classList.add('dim');
    if(hasToken) document.getElementById('previewBtn').classList.add('show');
    const btn=document.getElementById('dlBtn');
    btn.className='dl-btn user';btn.textContent='⬇ Download User Panorama (Full-Res)';
    if(!hasToken) showMapsBox(r);

  } else if(!r.panoId&&r.coords){
    document.getElementById('coordsText').textContent=
      `⚠ Only coordinates (${r.coords.lat.toFixed(5)}, ${r.coords.lng.toFixed(5)}) — use Maps link below.`;
    document.getElementById('badgeCoords').classList.add('show');
    showMapsBox(r);
  }
}
function clearAll() {
  document.getElementById('urlInput').value='';
  document.getElementById('step2Input').value='';
  document.getElementById('urlInput').focus();
  currentDet=null;currentMapsUrl=null;
  ['badgeSV','badgeUser','badgeCoords','mapsBox','progressSection'].forEach(id=>
    document.getElementById(id).classList.remove('show','active'));
  document.getElementById('zoomWrap').classList.remove('dim');
  document.getElementById('previewBtn').classList.remove('show');
  const btn=document.getElementById('dlBtn');
  btn.className='dl-btn';btn.textContent='⬇ Download Full-Res Panorama';btn.disabled=false;
  hideStatus();
}

// ═══════════════════════════════════════════
// SHARE INTENT HANDLER (called by Android)
// ═══════════════════════════════════════════
window.handleSharedUrl = function(url) {
  if (!url) return;
  switchTab('single');
  document.getElementById('urlInput').value = url;
  onUrlChange();
};

// ═══════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════
document.getElementById('urlInput').addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();startDownload();}
});
document.getElementById('step2Input').addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();startDownload();}
});
</script>
