name: Build PanoView APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK build tools and platforms
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: Install npm dependencies
        run: npm install

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android platform
        run: npx cap add android

      - name: Patch Android project
        run: python3 patch_android.py

      - name: Fix gradle build versions
        run: |
          # Force compileSdk and targetSdk to 33, buildTools to 33.0.2
          sed -i 's/compileSdk = .*/compileSdk = 33/' android/app/build.gradle || true
          sed -i 's/compileSdkVersion .*/compileSdkVersion 33/' android/app/build.gradle || true
          sed -i 's/targetSdk = .*/targetSdk = 33/' android/app/build.gradle || true
          sed -i 's/targetSdkVersion .*/targetSdkVersion 33/' android/app/build.gradle || true
          sed -i 's/buildToolsVersion .*/buildToolsVersion "33.0.2"/' android/app/build.gradle || true
          sed -i "s/classpath 'com.android.tools.build:gradle:[^']*'/classpath 'com.android.tools.build:gradle:8.0.2'/" android/build.gradle || true
          echo "--- app/build.gradle ---"
          cat android/app/build.gradle
          echo "--- build.gradle ---"
          cat android/build.gradle

      - name: Fix gradle wrapper version
        run: |
          sed -i 's|gradle-.*-bin.zip|gradle-8.0.2-bin.zip|' android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -100

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PanoView-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
